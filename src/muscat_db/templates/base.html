<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MuSCAT ObsLog{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f1117' stroke='%2345d6b5' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='14' fill='none' stroke='%236c8cff' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%2345d6b5'/%3E%3Cg fill='%23e1e4ed'%3E%3Ccircle cx='12' cy='14' r='1.6'/%3E%3Ccircle cx='52' cy='18' r='1.2'/%3E%3Ccircle cx='50' cy='48' r='1.8'/%3E%3Ccircle cx='14' cy='50' r='1.4'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f1117' stroke='%2345d6b5' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='14' fill='none' stroke='%236c8cff' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%2345d6b5'/%3E%3C/svg%3E">
<style>
  :root, [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242838;
    --border: #2e3348;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --accent: #6c8cff;
    --accent2: #45d6b5;
    --red: #f87171;
    --green: #6ee7b7;
    --input-bg: #1a1d27;
  }
  [data-theme="light"] {
    --bg: #f7f8fb;
    --surface: #ffffff;
    --surface2: #eef0f6;
    --border: #d8dce6;
    --text: #1a1d27;
    --text-dim: #5b6178;
    --accent: #3457d5;
    --accent2: #0f9d8b;
    --red: #c0392b;
    --green: #16a085;
    --input-bg: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex; align-items: center; gap: 1.5rem;
  }
  nav a {
    color: var(--text-dim); text-decoration: none; font-size: 0.9rem;
    transition: color 0.15s;
  }
  nav a:hover { color: var(--accent); }
  nav .brand {
    color: var(--accent2); font-weight: 700; font-size: 1.1rem;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
  h2 { font-size: 1.15rem; font-weight: 500; margin-bottom: 1rem; color: var(--text-dim); }
  .card-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card a { color: var(--text); text-decoration: none; }
  .card .name  { font-size: 1.1rem; font-weight: 600; }
  .card .meta  { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.35rem; }
  .card .count { font-size: 0.85rem; color: var(--accent2); margin-top: 0.35rem; }
  table {
    width: 100%; border-collapse: collapse; margin: 1rem 0;
    font-size: 0.85rem;
  }
  th {
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 500;
    text-align: left;
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr:hover td { background: var(--surface); }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .badge-green  { background: #065f46; color: #6ee7b7; }
  .badge-blue   { background: #1e3a5f; color: #93c5fd; }
  .badge-amber  { background: #5c3d0e; color: #fcd34d; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.8rem; }
  nav .spacer { flex: 1; }
  .theme-toggle {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.35rem;
    width: 2.1rem; height: 2.1rem;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, transform 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: rotate(15deg); }
  .theme-toggle svg { width: 1.05rem; height: 1.05rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: inline; }
  #loading-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200% 100%;
    animation: loading-slide 1.1s linear infinite;
    z-index: 9999;
    transition: opacity 0.25s ease;
  }
  #loading-bar.done { opacity: 0; pointer-events: none; }
  @keyframes loading-slide {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 0.75rem;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    z-index: 9998;
  }
  #status-bar.visible { transform: translateY(0); }
  #status-bar .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }
  .search-bar {
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .search-bar input[type="text"] {
    flex: 1; min-width: 220px;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
  }
  .search-bar input[type="text"]:focus {
    outline: none; border-color: var(--accent);
  }
  .search-bar label {
    color: var(--text-dim); font-size: 0.85rem;
    display: flex; align-items: center; gap: 0.35rem;
    cursor: pointer;
  }
  .search-bar .hint { color: var(--text-dim); font-size: 0.8rem; }
  .search-bar .invalid { color: var(--red); font-size: 0.8rem; }
</style>
</head>
<body>
<div id="loading-bar" role="progressbar" aria-label="Loading"></div>
<nav>
  <a class="brand" href="/">MuSCAT-db</a>
  <a href="/">Logs</a>
  <span class="spacer"></span>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="4.5"  y1="4.5"  x2="6.6"  y2="6.6"/>
      <line x1="17.4" y1="17.4" x2="19.5" y2="19.5"/>
      <line x1="4.5"  y1="19.5" x2="6.6"  y2="17.4"/>
      <line x1="17.4" y1="6.6"  x2="19.5" y2="4.5"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5z"/>
    </svg>
  </button>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
<div id="status-bar" role="status" aria-live="polite">
  <span class="dot"></span>
  <span id="status-text">Loading…</span>
</div>
<script>
  (function () {
    const root = document.documentElement;
    const btn = document.getElementById('theme-toggle');
    const stored = localStorage.getItem('muscat-theme');
    apply(stored || 'dark');
    btn.addEventListener('click', function () {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      apply(next);
      localStorage.setItem('muscat-theme', next);
    });
    function apply(t) { root.setAttribute('data-theme', t); }
  })();

  (function () {
    const bar    = document.getElementById('loading-bar');
    const status = document.getElementById('status-bar');
    const text   = document.getElementById('status-text');
    const table  = document.getElementById('targets-table');

    if (table) {
      status.classList.add('visible');
      const rows = table.tBodies[0] ? table.tBodies[0].rows.length : 0;
      text.textContent = 'Rendering ' + rows.toLocaleString() + ' targets…';
    }

    function done() {
      bar.classList.add('done');
      if (status.classList.contains('visible')) {
        text.textContent = 'Ready';
        setTimeout(function () { status.classList.remove('visible'); }, 700);
      }
      setTimeout(function () { bar.remove(); }, 400);
    }

    if (document.readyState === 'complete') {
      done();
    } else {
      window.addEventListener('load', done);
    }
  })();
</script>
</body>
</html>
