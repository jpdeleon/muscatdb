<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MuSCAT ObsLog{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f1117' stroke='%2345d6b5' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='14' fill='none' stroke='%236c8cff' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%2345d6b5'/%3E%3Cg fill='%23e1e4ed'%3E%3Ccircle cx='12' cy='14' r='1.6'/%3E%3Ccircle cx='52' cy='18' r='1.2'/%3E%3Ccircle cx='50' cy='48' r='1.8'/%3E%3Ccircle cx='14' cy='50' r='1.4'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230f1117' stroke='%2345d6b5' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='14' fill='none' stroke='%236c8cff' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%2345d6b5'/%3E%3C/svg%3E">
<style>
  :root, [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242838;
    --border: #2e3348;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --accent: #6c8cff;
    --accent2: #45d6b5;
    --red: #f87171;
    --green: #6ee7b7;
    --input-bg: #1a1d27;
  }
  [data-theme="light"] {
    --bg: #f7f8fb;
    --surface: #ffffff;
    --surface2: #eef0f6;
    --border: #d8dce6;
    --text: #1a1d27;
    --text-dim: #5b6178;
    --accent: #3457d5;
    --accent2: #0f9d8b;
    --red: #c0392b;
    --green: #16a085;
    --input-bg: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex; align-items: center; gap: 1.5rem;
  }
  nav a {
    color: var(--text-dim); text-decoration: none; font-size: 0.9rem;
    transition: color 0.15s;
  }
  nav a:hover { color: var(--accent); }
  nav .brand {
    color: var(--accent2); font-weight: 700; font-size: 1.1rem;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; }
  h2 { font-size: 1.15rem; font-weight: 500; margin-bottom: 1rem; color: var(--text-dim); }
  .card-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card a { color: var(--text); text-decoration: none; }
  .card .name  { font-size: 1.1rem; font-weight: 600; }
  .card .meta  { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.35rem; }
  .card .count { font-size: 0.85rem; color: var(--accent2); margin-top: 0.35rem; }
  table {
    width: 100%; border-collapse: collapse; margin: 1rem 0;
    font-size: 0.85rem;
  }
  table.resizable-init { table-layout: fixed; }
  th {
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 500;
    text-align: left;
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: relative;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th .col-resizer {
    position: absolute;
    top: 0; right: -3px;
    width: 8px; height: 100%;
    cursor: col-resize;
    user-select: none;
    z-index: 5;
  }
  th .col-resizer::after {
    content: ''; display: block;
    position: absolute; top: 25%; right: 3px;
    width: 2px; height: 50%;
    background: var(--border);
    transition: background 0.15s;
  }
  th .col-resizer:hover::after,
  th .col-resizer.resizing::after {
    background: var(--accent);
  }
  th.resizing, td.col-resizing {
    background: color-mix(in srgb, var(--accent) 8%, transparent);
  }
  tr:hover td { background: var(--surface); }
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .badge-green  { background: #065f46; color: #6ee7b7; }
  .badge-blue   { background: #1e3a5f; color: #ffffff; }
  .badge-amber  { background: #5c3d0e; color: #fcd34d; }
  .badge-filter-g   { background: #2a3f6b; color: #c9d4ee; }
  .badge-filter-r   { background: #2b4a3a; color: #c4e0cf; }
  .badge-filter-i   { background: #5a4520; color: #ecd9a8; }
  .badge-filter-z   { background: #5a2e2e; color: #ecc8c8; }
  .badge-filter-g.narrow { background: #16223c; color: #8fa3cc; }
  .badge-filter-r.narrow { background: #142e22; color: #88b69d; }
  .badge-filter-i.narrow { background: #382912; color: #c2a76d; }
  .badge-filter-z.narrow { background: #381c1c; color: #c08e8e; }
  .badge-filter-other { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  [data-theme="light"] .badge-filter-g        { background: #dde6f5; color: #1e3a6b; }
  [data-theme="light"] .badge-filter-r        { background: #d9ebe0; color: #1f4a3a; }
  [data-theme="light"] .badge-filter-i        { background: #f1e6cd; color: #5a4520; }
  [data-theme="light"] .badge-filter-z        { background: #f1d9d9; color: #6e2a2a; }
  [data-theme="light"] .badge-filter-g.narrow { background: #aebfdd; color: #0d2247; }
  [data-theme="light"] .badge-filter-r.narrow { background: #afcfba; color: #0d2c20; }
  [data-theme="light"] .badge-filter-i.narrow { background: #d6bf86; color: #3b2a0a; }
  [data-theme="light"] .badge-filter-z.narrow { background: #d6a8a8; color: #4a1818; }
  .note-cell { cursor: text; min-width: 140px; position: relative; }
  .note-cell .note-text { color: var(--text); word-break: break-word; }
  .note-cell .note-placeholder { color: var(--text-dim); font-style: italic; font-size: 0.8rem; }
  .note-cell:hover .note-placeholder { color: var(--accent); }
  .note-cell.editing { padding: 0.25rem; }
  .note-cell textarea {
    width: 100%; min-height: 2.2rem; resize: vertical;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--accent); border-radius: 4px;
    padding: 0.35rem 0.5rem; font: inherit;
  }
  .note-cell .note-actions { margin-top: 0.25rem; display: flex; gap: 0.35rem; }
  .note-cell .note-actions button {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 0.2rem 0.55rem; font-size: 0.75rem; cursor: pointer;
  }
  .note-cell .note-actions button.save { border-color: var(--accent2); color: var(--accent2); }
  .note-cell .note-actions button.del  { border-color: var(--red);     color: var(--red); margin-left: auto; }
  .note-cell .note-actions button:hover { filter: brightness(1.2); }
  tr.filter-row th { padding: 0.3rem 0.4rem; background: var(--surface); }
  tr.filter-row th input {
    width: 100%; box-sizing: border-box;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 0.25rem 0.45rem;
    font-size: 0.78rem; font-family: inherit;
  }
  tr.filter-row th input:focus { outline: none; border-color: var(--accent); }
  tr.filter-row th input.invalid { border-color: var(--red); }
  tr.filter-row th input::placeholder { color: var(--text-dim); font-style: italic; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent); }
  th.sortable::after {
    content: '';
    display: inline-block;
    margin-left: 0.35rem;
    font-size: 0.7em;
    color: var(--text-dim);
    opacity: 0.4;
  }
  th.sortable[data-sort-dir="asc"]::after  { content: '▲'; opacity: 1; color: var(--accent); }
  th.sortable[data-sort-dir="desc"]::after { content: '▼'; opacity: 1; color: var(--accent); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.8rem; }
  nav .spacer { flex: 1; }
  .theme-toggle {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.35rem;
    width: 2.1rem; height: 2.1rem;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, transform 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: rotate(15deg); }
  .theme-toggle svg { width: 1.05rem; height: 1.05rem; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: inline; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: inline; }
  #loading-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
    background-size: 200% 100%;
    animation: loading-slide 1.1s linear infinite;
    z-index: 9999;
    transition: opacity 0.25s ease;
  }
  #loading-bar.done { opacity: 0; pointer-events: none; }
  @keyframes loading-slide {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 0.75rem;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    z-index: 9998;
  }
  #status-bar.visible { transform: translateY(0); }
  #status-bar .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }
  .search-bar {
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
  }
  .search-bar input[type="text"] {
    flex: 1; min-width: 220px;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
  }
  .search-bar input[type="text"]:focus {
    outline: none; border-color: var(--accent);
  }
  .search-bar label {
    color: var(--text-dim); font-size: 0.85rem;
    display: flex; align-items: center; gap: 0.35rem;
    cursor: pointer;
  }
  .search-bar .hint { color: var(--text-dim); font-size: 0.8rem; }
  .search-bar .invalid { color: var(--red); font-size: 0.8rem; }
  .search-bar .csv-btn {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.4rem 0.75rem; border-radius: 6px;
    background: var(--accent); color: #fff;
    font-size: 0.85rem; font-weight: 600; text-decoration: none;
    white-space: nowrap;
  }
  .search-bar .csv-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="loading-bar" role="progressbar" aria-label="Loading"></div>
<nav>
  <a class="brand" href="/">MuSCAT-db</a>
  <a href="/logs">Logs</a>
  <a href="/photometry">Photometry</a>
  <a href="/transit-fit">Transit Fit</a>
  <a href="/jobs">Jobs</a>
  <span class="spacer"></span>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light/dark theme" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="4.5"  y1="4.5"  x2="6.6"  y2="6.6"/>
      <line x1="17.4" y1="17.4" x2="19.5" y2="19.5"/>
      <line x1="4.5"  y1="19.5" x2="6.6"  y2="17.4"/>
      <line x1="17.4" y1="6.6"  x2="19.5" y2="4.5"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5z"/>
    </svg>
  </button>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
<div id="status-bar" role="status" aria-live="polite">
  <span class="dot"></span>
  <span id="status-text">Loading…</span>
</div>
<script>
  (function () {
    const root = document.documentElement;
    const btn = document.getElementById('theme-toggle');
    const stored = localStorage.getItem('muscat-theme');
    apply(stored || 'dark');
    btn.addEventListener('click', function () {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      apply(next);
      localStorage.setItem('muscat-theme', next);
    });
    function apply(t) { root.setAttribute('data-theme', t); }
  })();

  (function () {
    const bar    = document.getElementById('loading-bar');
    const status = document.getElementById('status-bar');
    const text   = document.getElementById('status-text');
    const table  = document.getElementById('targets-table');

    if (table) {
      status.classList.add('visible');
      const rows = table.tBodies[0] ? table.tBodies[0].rows.length : 0;
      text.textContent = 'Rendering ' + rows.toLocaleString() + ' targets…';
    }

    function done() {
      bar.classList.add('done');
      if (status.classList.contains('visible')) {
        text.textContent = 'Ready';
        setTimeout(function () { status.classList.remove('visible'); }, 700);
      }
      // Keep the bar in the DOM so we can re-show it on the next navigation.
    }

    function showLoading(label) {
      bar.classList.remove('done');
      text.textContent = label || 'Loading…';
      status.classList.add('visible');
    }
    window.showLoading = showLoading;

    if (document.readyState === 'complete') {
      done();
    } else {
      showLoading('Loading…');
      window.addEventListener('load', done);
    }

    // Re-show the bar when the user navigates away via a same-origin link.
    document.addEventListener('click', function (e) {
      const link = e.target.closest('a');
      if (!link) return;
      if (link.target && link.target !== '_self') return;
      if (link.hasAttribute('download')) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      const href = link.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:')) return;
      const url = new URL(link.href, window.location.href);
      if (url.origin !== window.location.origin) return;
      // Skip pure in-page hash changes (same path, different fragment).
      if (url.pathname === window.location.pathname && url.hash) return;
      showLoading('Loading…');
    }, true);

    // Restore on bfcache restores (back/forward navigation).
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) done();
    });
  })();

  // ----- resizable table columns ------------------------------------------
  (function () {
    function initTable(table) {
      if (table.dataset.resizableInit === '1') return;
      table.dataset.resizableInit = '1';
      const headRow = table.tHead && table.tHead.rows[0];
      if (!headRow) return;
      const ths = Array.from(headRow.cells);
      const tableId = table.id || 'tbl-' + Math.random().toString(36).slice(2);
      // Lock in current natural widths (measured under table-layout: auto) so
      // dragging one column doesn't shove the others around.
      const measured = ths.map(function (th, i) {
        const stored = localStorage.getItem('colw:' + tableId + ':' + i);
        return stored ? parseFloat(stored) : th.getBoundingClientRect().width;
      });
      ths.forEach(function (th, i) {
        th.style.width = measured[i] + 'px';
      });
      // Now switch to fixed layout so column widths are honoured exactly.
      table.classList.add('resizable-init');
      ths.forEach(function (th, i) {
        if (i === ths.length - 1) return;  // no handle on the last column
        const handle = document.createElement('div');
        handle.className = 'col-resizer';
        handle.title = 'Drag to resize column';
        th.appendChild(handle);
        handle.addEventListener('mousedown', function (e) {
          startResize(e, table, th, i, tableId);
        });
        handle.addEventListener('dblclick', function () {
          // Double-click resets this column to auto-fit content.
          th.style.width = '';
          localStorage.removeItem('colw:' + tableId + ':' + i);
          th.style.width = th.getBoundingClientRect().width + 'px';
          localStorage.setItem('colw:' + tableId + ':' + i,
                               parseFloat(th.style.width));
        });
      });
    }

    function startResize(e, table, th, idx, tableId) {
      e.preventDefault();
      e.stopPropagation();
      const startX = e.clientX;
      const startW = th.getBoundingClientRect().width;
      const handle = e.currentTarget;
      handle.classList.add('resizing');
      th.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      function onMove(ev) {
        const newW = Math.max(40, startW + (ev.clientX - startX));
        th.style.width = newW + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        handle.classList.remove('resizing');
        th.classList.remove('resizing');
        document.body.style.cursor = '';
        const finalW = parseFloat(th.style.width);
        if (!isNaN(finalW)) {
          localStorage.setItem('colw:' + tableId + ':' + idx, finalW);
        }
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function initAll() {
      document.querySelectorAll('table').forEach(initTable);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAll);
    } else {
      initAll();
    }

    // Re-init tables inside <details> when expanded (their cells have no
    // measured width while hidden).
    // ----- click-to-sort columns ------------------------------------------
    function raToHours(s) {
      const m = (s || '').match(/^\s*(-?\d+):(\d+)(?::(\d+(?:\.\d+)?))?/);
      if (!m) return NaN;
      return parseInt(m[1], 10) + parseInt(m[2], 10)/60 + (parseFloat(m[3]) || 0)/3600;
    }
    function decToDegrees(s) {
      const m = (s || '').match(/^\s*([+-]?)(\d+):(\d+)(?::(\d+(?:\.\d+)?))?/);
      if (!m) return NaN;
      const sign = m[1] === '-' ? -1 : 1;
      return sign * (parseInt(m[2], 10) + parseInt(m[3], 10)/60 + (parseFloat(m[4]) || 0)/3600);
    }

    function detectKind(values) {
      const non = values.filter(v => v && v.trim() !== '');
      if (!non.length) return 'string';
      if (non.every(v => /^[+-]\d{1,2}:\d{2}(:\d+(\.\d+)?)?$/.test(v.trim()))) return 'dec';
      if (non.every(v => /^\d{1,2}:\d{2}(:\d+(\.\d+)?)?$/.test(v.trim()))) return 'ra';
      if (non.every(v => !isNaN(parseFloat(v.replace(/[^\d.+\-eE]/g, ''))))) return 'number';
      return 'string';
    }
    function keyFor(kind, raw) {
      if (raw == null) return null;
      if (kind === 'number') {
        const n = parseFloat(raw.replace(/[^\d.+\-eE]/g, ''));
        return isNaN(n) ? null : n;
      }
      if (kind === 'ra')  { const h = raToHours(raw);   return isNaN(h) ? null : h; }
      if (kind === 'dec') { const d = decToDegrees(raw); return isNaN(d) ? null : d; }
      return (raw || '').toString().toLowerCase();
    }
    function rowKey(row, colIdx, sortAttr, kind) {
      if (sortAttr && row.dataset[sortAttr] !== undefined) {
        const raw = row.dataset[sortAttr];
        if (kind === 'number') {
          const n = parseFloat(raw);
          return isNaN(n) ? null : n;
        }
        if (kind === 'ra')  { const h = raToHours(raw);    return isNaN(h) ? null : h; }
        if (kind === 'dec') { const d = decToDegrees(raw); return isNaN(d) ? null : d; }
        return (raw || '').toString().toLowerCase();
      }
      const cell = row.cells[colIdx];
      return keyFor(kind, cell ? cell.textContent.trim() : '');
    }

    function initSortable(table) {
      if (table.dataset.sortableInit === '1') return;
      table.dataset.sortableInit = '1';
      const headerRow = table.tHead && table.tHead.rows[0];
      const tbody = table.tBodies[0];
      if (!headerRow || !tbody) return;
      // Snapshot original row order so a third click can restore it.
      const originalOrder = Array.from(tbody.rows);
      originalOrder.forEach((r, i) => { r.dataset._origIdx = i; });

      Array.from(headerRow.cells).forEach((th, colIdx) => {
        if (th.classList.contains('no-sort')) return;
        th.classList.add('sortable');
        th.addEventListener('click', function (e) {
          if (e.target.closest('.col-resizer')) return;  // ignore handle clicks
          const dir = th.dataset.sortDir;
          const next = dir === 'asc' ? 'desc' : dir === 'desc' ? '' : 'asc';
          Array.from(headerRow.cells).forEach(h => h.removeAttribute('data-sort-dir'));
          if (next) th.dataset.sortDir = next;

          if (!next) {
            // Restore original order.
            originalOrder.forEach(r => tbody.appendChild(r));
            return;
          }

          // Decide sort kind: explicit hint or auto-detect from cell text.
          let kind = th.dataset.sortType;
          if (!kind) {
            const samples = Array.from(tbody.rows).slice(0, 25)
              .map(r => r.cells[colIdx] ? r.cells[colIdx].textContent.trim() : '');
            kind = detectKind(samples);
          }
          const sortAttr = th.dataset.sortAttr;  // camelCase data-* key

          const dirSign = next === 'asc' ? 1 : -1;
          const sorted = Array.from(tbody.rows).slice().sort((a, b) => {
            const ka = rowKey(a, colIdx, sortAttr, kind);
            const kb = rowKey(b, colIdx, sortAttr, kind);
            if (ka == null && kb == null) return 0;
            if (ka == null) return 1;   // nulls always last
            if (kb == null) return -1;
            if (ka < kb) return -1 * dirSign;
            if (ka > kb) return  1 * dirSign;
            // stable tiebreak on original index
            return (parseInt(a.dataset._origIdx, 10) - parseInt(b.dataset._origIdx, 10));
          });
          sorted.forEach(r => tbody.appendChild(r));
        });
      });
    }

    function initAllSortable() {
      document.querySelectorAll('table').forEach(initSortable);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAllSortable);
    } else {
      initAllSortable();
    }

    // ----- inline notes editor (delegated) --------------------------------
    document.addEventListener('click', function (e) {
      const cell = e.target.closest('.note-cell');
      if (!cell || cell.classList.contains('editing')) return;
      if (e.target.closest('a, button')) return;
      openEditor(cell);
    });

    function openEditor(cell) {
      const obj = cell.dataset.object;
      const current = cell.querySelector('.note-text').textContent;
      cell.classList.add('editing');
      cell.innerHTML = '';
      const ta = document.createElement('textarea');
      ta.value = current;
      ta.rows = 2;
      ta.placeholder = 'Type a note…';
      const actions = document.createElement('div');
      actions.className = 'note-actions';
      const save = document.createElement('button');
      save.className = 'save'; save.textContent = 'Save';
      const cancel = document.createElement('button');
      cancel.textContent = 'Cancel';
      const del = document.createElement('button');
      del.className = 'del'; del.textContent = 'Delete';
      actions.append(save, cancel, del);
      cell.append(ta, actions);
      ta.focus(); ta.select();

      function close(note) {
        cell.classList.remove('editing');
        cell.innerHTML =
          '<span class="note-text">' + escapeHtml(note) + '</span>' +
          '<span class="note-placeholder"' + (note ? ' style="display:none;"' : '') + '>+ add note</span>';
      }
      function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }

      async function commit() {
        const value = ta.value.trim();
        try {
          const res = await fetch('/api/targets/' + encodeURIComponent(obj) + '/note', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({note: value}),
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          close(value);
        } catch (err) {
          alert('Save failed: ' + err.message);
        }
      }
      async function destroy() {
        try {
          const res = await fetch('/api/targets/' + encodeURIComponent(obj) + '/note', {method: 'DELETE'});
          if (!res.ok) throw new Error('HTTP ' + res.status);
          close('');
        } catch (err) {
          alert('Delete failed: ' + err.message);
        }
      }

      save.addEventListener('click', commit);
      del.addEventListener('click', destroy);
      cancel.addEventListener('click', () => close(current));
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); commit(); }
        else if (e.key === 'Escape') { e.preventDefault(); close(current); }
      });
    }

    document.addEventListener('toggle', function (e) {
      if (e.target.tagName === 'DETAILS' && e.target.open) {
        e.target.querySelectorAll('table').forEach(function (t) {
          delete t.dataset.resizableInit;
          t.classList.remove('resizable-init');
          // Clear previously-set widths so we re-measure from real layout.
          if (t.tHead && t.tHead.rows[0]) {
            Array.from(t.tHead.rows[0].cells).forEach(function (th) {
              th.querySelectorAll('.col-resizer').forEach(h => h.remove());
              th.style.width = '';
            });
          }
          initTable(t);
        });
      }
    }, true);
  })();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
