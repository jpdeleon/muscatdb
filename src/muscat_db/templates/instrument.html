{% extends "base.html" %}
{% block title %}{{ instrument }} — MuSCAT ObsLog{% endblock %}
{% block content %}
<h1><a href="/logs" class="crumb">Instruments</a> / {{ instrument }}</h1>
<table>
<thead>
  <tr><th>Date</th><th>CCDs</th><th>Frames</th></tr>
</thead>
<tbody>
{% for d in dates %}
  <tr>
    <td><a href="/{{ instrument }}/{{ d.obsdate }}">{{ d.obsdate }}</a></td>
    <td>{{ d.nccd }}</td>
    <td>{{ d.nframes }}</td>
  </tr>
{% else %}
  <tr><td colspan="3" class="empty-cell">No dates found for this instrument.</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
