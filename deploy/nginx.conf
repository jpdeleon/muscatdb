# nginx configuration for muscat-db reverse proxy with HTTP Basic Auth.
#
# Install: sudo ln -sf $PWD/deploy/nginx.conf /etc/nginx/sites-available/muscat-db
#          sudo ln -sf /etc/nginx/sites-available/muscat-db /etc/nginx/sites-enabled/
#          sudo systemctl reload nginx
#
# Users authenticate via SSH tunnel → localhost:8000 → nginx → uvicorn :8001.
# The htpasswd file is managed with:  muscat-db htpasswd add <username>

server {
    listen 127.0.0.1:8000;

    auth_basic           "MuSCAT-db";
    auth_basic_user_file /etc/nginx/.htpasswd-muscatdb;

    # nginx's 1m default rejects large POST bodies (e.g. LCO archive/download
    # with many frames selected) with its own HTML error page before the
    # request ever reaches uvicorn, which breaks the frontend's `.json()`
    # parse. The app itself trims those payloads to essential fields, but
    # this raises the ceiling as a safety net for large batches.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8001;

        # Forward the authenticated username to the backend.
        # nginx strips any incoming X-Forwarded-User and sets it from $remote_user.
        proxy_set_header X-Forwarded-User $remote_user;
        # Generated by setup-nginx.sh; authenticates nginx to uvicorn so local
        # accounts cannot bypass HTTP Basic Auth via 127.0.0.1:8001.
        include /etc/nginx/muscat-db-proxy-secret.conf;

        # Preserve the client-facing port so Origin/Referer validation compares
        # against the browser's exact authority (e.g. localhost:8000).
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering so live log streaming works.
        proxy_buffering off;
        proxy_cache off;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:8001/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;

        # Authenticate the websocket the same way as HTTP requests so the chat
        # can attribute messages and deliver @mentions to the right user.
        # nginx strips any incoming X-Forwarded-User and sets it from $remote_user;
        # the shared secret proves the connection came through nginx, not a local
        # account hitting 127.0.0.1:8001 directly.
        proxy_set_header X-Forwarded-User $remote_user;
        include /etc/nginx/muscat-db-proxy-secret.conf;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
