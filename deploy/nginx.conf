# nginx configuration for muscat-db reverse proxy with HTTP Basic Auth.
#
# Install: sudo ln -sf $PWD/deploy/nginx.conf /etc/nginx/sites-available/muscat-db
#          sudo ln -sf /etc/nginx/sites-available/muscat-db /etc/nginx/sites-enabled/
#          sudo systemctl reload nginx
#
# Users authenticate via SSH tunnel → localhost:8000 → nginx → uvicorn :8001.
# The htpasswd file is managed with:  muscat-db htpasswd add <username>

server {
    listen 127.0.0.1:8000;

    auth_basic           "MuSCAT-db";
    auth_basic_user_file /etc/nginx/.htpasswd-muscatdb;

    location / {
        proxy_pass http://127.0.0.1:8001;

        # Forward the authenticated username to the backend.
        # nginx strips any incoming X-Forwarded-User and sets it from $remote_user.
        proxy_set_header X-Forwarded-User $remote_user;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering so live log streaming works.
        proxy_buffering off;
        proxy_cache off;
    }
}
