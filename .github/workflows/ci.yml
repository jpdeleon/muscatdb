name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (fast suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      # The slow suite (-m slow) profiles real prose/timer runs against host
      # data and pytest.skips cleanly off-host, so the default fast suite is the
      # gate. pyproject's addopts already deselects slow tests.
      - name: Run fast test suite
        run: uv run pytest

  lint:
    name: ruff (advisory)
    runs-on: ubuntu-latest
    # Advisory only: the repo has pre-existing lint debt tracked as audit L1/L2.
    # This surfaces real defects without blocking; make it required once those
    # land by removing continue-on-error and tightening tool.ruff.lint.ignore.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check --output-format=github .
